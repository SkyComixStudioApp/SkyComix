<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servidor en Mantenimiento</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Evita barras de desplazamiento si las partículas se salen */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000000; /* Fondo negro para el body */
            color: #ffffff; /* Color del texto blanco por defecto */
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #000000; /* Fondo negro para el contenedor de partículas */
            background-image: url('');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: 50% 50%;
        }

        .maintenance-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10; /* Asegura que el texto esté por encima de las partículas */
            color: #ffffff;
            font-size: 3em; /* Tamaño grande para el texto */
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); /* Sombra suave para el texto */
        }

        /* Responsive design para tamaños de fuente */
        @media (max-width: 768px) {
            .maintenance-message {
                font-size: 2em;
            }
        }
        @media (max-width: 480px) {
            .maintenance-message {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="maintenance-message">
        Servidor en Mantenimiento
    </div>

    <script src="js/particles.min.js"></script>
    <script>
        particlesJS('particles-js', {
            "particles": {
                "number": {
                    "value": 80,
                    "density": {
                        "enable": true,
                        "value_area": 800
                    }
                },
                "color": {
                    "value": "#ffffff" /* Color de las partículas */
                },
                "shape": {
                    "type": "circle", /* Forma de las partículas (círculo, estrella, etc.) */
                    "stroke": {
                        "width": 0,
                        "color": "#000000"
                    },
                    "polygon": {
                        "nb_sides": 5
                    }
                },
                "opacity": {
                    "value": 0.5,
                    "random": false,
                    "anim": {
                        "enable": false,
                        "speed": 1,
                        "opacity_min": 0.1,
                        "sync": false
                    }
                },
                "size": {
                    "value": 3, /* Tamaño de las partículas */
                    "random": true,
                    "anim": {
                        "enable": false,
                        "speed": 40,
                        "size_min": 0.1,
                        "sync": false
                    }
                },
                "line_linked": {
                    "enable": true, /* Conexiones entre partículas */
                    "distance": 150,
                    "color": "#ffffff",
                    "opacity": 0.4,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 3, /* Velocidad de movimiento */
                    "direction": "bottom", /* Dirección del movimiento (bottom, top, left, right) */
                    "random": false,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false,
                    "attract": {
                        "enable": false,
                        "rotateX": 600,
                        "rotateY": 1200
                    }
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": {
                        "enable": true,
                        "mode": "grab" /* Efecto al pasar el ratón (grab, bubble, repulse) */
                    },
                    "onclick": {
                        "enable": true,
                        "mode": "push" /* Efecto al hacer click (push, remove, bubble, repulse) */
                    },
                    "resize": true
                },
                "modes": {
                    "grab": {
                        "distance": 140,
                        "line_linked": {
                            "opacity": 1
                        }
                    },
                    "bubble": {
                        "distance": 400,
                        "size": 40,
                        "duration": 2,
                        "opacity": 8,
                        "speed": 3
                    },
                    "repulse": {
                        "distance": 200,
                        "duration": 0.4
                    },
                    "push": {
                        "particles_nb": 4
                    },
                    "remove": {
                        "particles_nb": 2
                    }
                }
            },
            "retina_detect": true
        });
    </script>

</body>
</html>
